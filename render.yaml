# Render Blueprint for the Genie backend.
# In Render: New → Blueprint → point at this repo. Then fill the secret
# values (marked sync:false) in the dashboard — they are NOT stored in git.
services:
  - type: web
    name: genie-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    # Free plan (no card required). NOTE: 512 MB RAM — browsing/search work,
    # but live discovery (Chromium) may OOM or time out. Bump to 'starter'
    # (paid) later for reliable discovery.
    plan: free
    autoDeploy: true
    branch: main
    envVars:
      - key: GENIE_DB_URL        # Neon connection string
        sync: false
      - key: GENIE_API_KEY       # shared secret (same value the frontend sends)
        sync: false
      - key: GENIE_CORS_ORIGINS  # https://<your-app>.vercel.app
        sync: false
      - key: OPENROUTER_API_KEY  # LLM for live discovery (the agent's real key)
        sync: false
      - key: ANTHROPIC_API_KEY   # optional Claude fallback (leave blank)
        sync: false
      - key: OPR_API_KEY         # optional — OpenPageRank metric
        sync: false
      - key: GEMINI_SEARCH_ENABLED  # Stage-A discovery: Gemini via OpenRouter
        value: "true"                # needs only OPENROUTER_API_KEY, no Google creds
      - key: PYTHONUNBUFFERED
        value: "1"
